<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa mental Psicoanálisis</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

</head>

<body>
    <svg id="map" aria-label="Mapa mental sobre conceptos básicos de psicoanálisis">
        <defs>
            <linearGradient id="centerGradient" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#fff8de" />
                <stop offset="58%" stop-color="#ffd99f" />
                <stop offset="100%" stop-color="#ff9d63" />
            </linearGradient>

            <linearGradient id="exportBackground" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#07101d" />
                <stop offset="52%" stop-color="#0a1525" />
                <stop offset="100%" stop-color="#0d1829" />
            </linearGradient>

            <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="150%">
                <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity=".32" />
            </filter>

            <filter id="centerShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".42" />
            </filter>
        </defs>
    </svg>

    <script src="script.js"></script>
</body>

</html>
